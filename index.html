<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --ink:#14171F;
  --ink-soft:#4A4F5C;
  --ink-faint:#8A8F9C;
  --paper:#FAFAF8;
  --paper-raised:#FFFFFF;
  --brand:#3D5AFE;
  --brand-dark:#2A3FCC;
  --brand-light:#EEF0FF;
  --accent:#FF6B4A;
  --accent-light:#FFEEE9;
  --success:#1FAA59;
  --success-light:#E8F8EE;
  --warn:#E5A923;
  --warn-light:#FDF4E1;
  --danger:#E5484D;
  --danger-light:#FDEAEA;
  --line:#E8E6E0;
  --line-soft:#F1EFE9;
  --shadow-sm: 0 1px 2px rgba(20,23,31,0.04), 0 1px 1px rgba(20,23,31,0.03);
  --shadow-md: 0 4px 12px rgba(20,23,31,0.06), 0 2px 4px rgba(20,23,31,0.04);
  --shadow-lg: 0 12px 32px rgba(20,23,31,0.10), 0 4px 8px rgba(20,23,31,0.04);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --font-display: 'Fraunces', serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  font-size: 15px;
  line-height: 1.5;
}
img{max-width:100%; display:block;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit; font-size:inherit;}
a{color:inherit; text-decoration:none;}
::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#D8D5CC; border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:#C5C1B5;}
:focus-visible{outline:2px solid var(--brand); outline-offset:2px; border-radius:4px;}

.serif{ font-family: var(--font-display); }
.mono{ font-family: var(--font-mono); }

/* ============ UTILITY ============ */
.app{display:none; min-height:100vh;}
.app.active{display:block;}
.hidden{display:none !important;}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:11px 20px; border-radius:10px; border:none; font-weight:600; font-size:14px;
  transition: all .15s ease; white-space:nowrap;
}
.btn-primary{ background:var(--brand); color:#fff; box-shadow: var(--shadow-sm); }
.btn-primary:hover{ background:var(--brand-dark); transform:translateY(-1px); box-shadow:var(--shadow-md); }
.btn-secondary{ background:var(--paper-raised); color:var(--ink); border:1px solid var(--line); }
.btn-secondary:hover{ border-color:var(--ink-faint); }
.btn-ghost{ background:transparent; color:var(--ink-soft); }
.btn-ghost:hover{ background:var(--line-soft); color:var(--ink); }
.btn-danger{ background:var(--danger-light); color:var(--danger); }
.btn-danger:hover{ background:var(--danger); color:#fff; }
.btn-sm{ padding:7px 14px; font-size:13px; border-radius:8px; }
.btn-lg{ padding:14px 28px; font-size:15px; border-radius:12px; }
.btn:disabled{ opacity:.5; cursor:not-allowed; transform:none !important; }
.btn-icon{ width:36px; height:36px; padding:0; border-radius:8px; }

.card{ background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius-md); box-shadow:var(--shadow-sm); }
.pill{ display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:100px; font-size:12px; font-weight:600; }
.pill-success{ background:var(--success-light); color:var(--success); }
.pill-warn{ background:var(--warn-light); color:#9A7416; }
.pill-danger{ background:var(--danger-light); color:var(--danger); }
.pill-brand{ background:var(--brand-light); color:var(--brand); }
.pill-neutral{ background:var(--line-soft); color:var(--ink-soft); }

.field{ margin-bottom:16px; }
.field label{ display:block; font-size:13px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; }
.field input, .field select, .field textarea{
  width:100%; padding:10px 12px; border:1.5px solid var(--line); border-radius:9px;
  background:var(--paper-raised); color:var(--ink); transition:border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus{ border-color:var(--brand); outline:none; }
.field .hint{ font-size:12px; color:var(--ink-faint); margin-top:4px; }
.field-row{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }

.modal-backdrop{
  position:fixed; inset:0; background:rgba(20,23,31,0.45); backdrop-filter:blur(2px);
  display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px;
  animation:fadeIn .15s ease;
}
@keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
.modal{
  background:var(--paper-raised); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg);
  width:100%; max-width:560px; max-height:90vh; overflow-y:auto; animation:slideUp .2s ease;
}
@keyframes slideUp{ from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);} }
.modal-header{ display:flex; align-items:center; justify-content:space-between; padding:22px 24px; border-bottom:1px solid var(--line-soft); }
.modal-header h3{ font-family:var(--font-display); font-size:20px; font-weight:600; }
.modal-body{ padding:24px; }
.modal-footer{ display:flex; justify-content:flex-end; gap:10px; padding:18px 24px; border-top:1px solid var(--line-soft); }

.toast-wrap{ position:fixed; bottom:24px; right:24px; z-index:2000; display:flex; flex-direction:column; gap:10px; }
.toast{
  background:var(--ink); color:#fff; padding:13px 18px; border-radius:10px; font-size:14px; font-weight:500;
  box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:10px; animation:toastIn .2s ease; max-width:340px;
}
.toast.success{ background:var(--success); }
.toast.error{ background:var(--danger); }
@keyframes toastIn{ from{opacity:0; transform:translateX(20px);} to{opacity:1; transform:translateX(0);} }

.empty-state{ text-align:center; padding:60px 24px; color:var(--ink-faint); }
.empty-state svg{ margin:0 auto 16px; opacity:.4; }
.empty-state h4{ font-family:var(--font-display); font-size:18px; color:var(--ink-soft); margin-bottom:6px; }
.empty-state p{ font-size:14px; max-width:320px; margin:0 auto; }

table{ width:100%; border-collapse:collapse; }
th{ text-align:left; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-faint); padding:10px 14px; border-bottom:1.5px solid var(--line); }
td{ padding:13px 14px; border-bottom:1px solid var(--line-soft); font-size:14px; }
tr:last-child td{ border-bottom:none; }
tbody tr{ transition:background .1s; }
tbody tr:hover{ background:var(--line-soft); }

.avatar{
  width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:13px; color:#fff; flex-shrink:0;
}
.loader{ width:18px; height:18px; border:2.5px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
.loader.dark{ border:2.5px solid var(--line); border-top-color:var(--brand); }
@keyframes spin{ to{transform:rotate(360deg);} }

@media(max-width:640px){
  .field-row{ grid-template-columns:1fr; }
}
</style>
</head>

function icon(name, cls=''){ return ICONS[name] || ''; }

function uid(prefix=''){ return prefix + Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }
function fmtMoney(n, cur='RM'){ const v = Number(n||0); return cur + ' ' + v.toLocaleString('en-MY', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(d){ if(!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('en-MY', {day:'2-digit', month:'short', year:'numeric'}); }
function fmtDateShort(d){ if(!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('en-MY', {day:'2-digit', month:'short'}); }
function timeAgo(d){
  const diff = Date.now() - new Date(d).getTime();
  const days = Math.floor(diff/86400000);
  if(days===0) return 'Today';
  if(days===1) return 'Yesterday';
  if(days<7) return days+'d ago';
  return fmtDate(d);
}
function daysUntil(d){ return Math.ceil((new Date(d).getTime() - Date.now())/86400000); }
function initials(name){ return (name||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join(''); }
function avatarColor(seed){
  const colors = ['#3D5AFE','#FF6B4A','#1FAA59','#E5A923','#9C5FFF','#16A3B8','#E5484D','#5C6BC0'];
  let hash = 0; for(let i=0;i<(seed||'').length;i++) hash = seed.charCodeAt(i) + ((hash<<5)-hash);
  return colors[Math.abs(hash) % colors.length];
}
function escapeHtml(s){ const d=document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
function toast(msg, type=''){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = (type==='success'?icon('check'):'') + `<span>${escapeHtml(msg)}</span>`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(20px)'; el.style.transition='all .2s'; setTimeout(()=>el.remove(), 200); }, 3200);
}

/* ============================================================
   QR CODE — generation (member card) + scanning (event check-in)
   QR payload format: "assohub:member:{memberId}" — a permanent,
   per-member identifier (not per-event). Scanning only looks up
   the member; the scanner code decides what to do with that ID
   (e.g. check them into whichever event is currently open).
   ============================================================ */
const QR_PREFIX = 'assohub:member:';

function memberQRPayload(memberId){ return QR_PREFIX + memberId; }

function parseMemberQRPayload(text){
  if(typeof text !== 'string' || !text.startsWith(QR_PREFIX)) return null;
  return text.slice(QR_PREFIX.length).trim() || null;
}

// Renders a QR code into the given element id. Requires qrcodejs (loaded via CDN in <head>).
function renderMemberQRCode(elementId, memberId, size=120){
  const el = document.getElementById(elementId);
  if(!el) return;
  el.innerHTML = '';
  if(typeof QRCode === 'undefined'){
    el.innerHTML = `<div style="font-size:11px; color:var(--ink-faint); padding:8px;">QR unavailable offline</div>`;
    return;
  }
  try{
    new QRCode(el, {
      text: memberQRPayload(memberId),
      width: size, height: size,
      colorDark: '#14171F', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
  } catch(e){
    el.innerHTML = `<div style="font-size:11px; color:var(--danger); padding:8px;">QR error</div>`;
  }
}

/* ---- Scanner: opens device camera, decodes frames with jsQR ---- */
let _qrScanState = { stream:null, rafId:null, active:false, onResult:null };

function openQRScannerModal(eventId){
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'qrScannerBackdrop';
  backdrop.style.zIndex = 1100;
  backdrop.innerHTML = `
    <div class="modal" style="max-width:420px;">
      <div class="modal-header"><h3>Scan to Check In</h3><button class="btn-icon btn-ghost" onclick="closeQRScanner()">${icon('close')}</button></div>
      <div class="modal-body">
        <div id="qrScanStatus" style="font-size:13px; color:var(--ink-faint); margin-bottom:12px; text-align:center;">Requesting camera access…</div>
        <div style="position:relative; border-radius:14px; overflow:hidden; background:#000; aspect-ratio:1/1;">
          <video id="qrVideo" playsinline muted style="width:100%; height:100%; object-fit:cover; display:block;"></video>
          <div style="position:absolute; inset:14%; border:2.5px solid rgba(255,255,255,.7); border-radius:16px; pointer-events:none;"></div>
        </div>
        <canvas id="qrCanvas" style="display:none;"></canvas>
        <div id="qrScanResult" style="margin-top:14px;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" style="width:100%;" onclick="closeQRScanner()">Cancel</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  startQRScanner(eventId);
}

async function startQRScanner(eventId){
  const statusEl = document.getElementById('qrScanStatus');
  if(typeof jsQR === 'undefined'){
    statusEl.textContent = 'QR scanning library unavailable. Check your connection and try again.';
    statusEl.style.color = 'var(--danger)';
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    statusEl.textContent = 'Camera access is not supported in this browser.';
    statusEl.style.color = 'var(--danger)';
    return;
  }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    _qrScanState.stream = stream;
    _qrScanState.active = true;
    const video = document.getElementById('qrVideo');
    video.srcObject = stream;
    await video.play();
    statusEl.textContent = 'Point the camera at a member\'s QR code';
    scanQRFrame(eventId);
  } catch(e){
    statusEl.textContent = 'Could not access camera. Check browser permissions and try again.';
    statusEl.style.color = 'var(--danger)';
  }
}

function scanQRFrame(eventId){
  if(!_qrScanState.active) return;
  const video = document.getElementById('qrVideo');
  const canvas = document.getElementById('qrCanvas');
  if(!video || !canvas || video.readyState !== video.HAVE_ENOUGH_DATA){
    _qrScanState.rafId = requestAnimationFrame(()=>scanQRFrame(eventId));
    return;
  }
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, imageData.width, imageData.height);
  if(code && code.data){
    handleQRScanResult(code.data, eventId);
    return; // pause scanning loop until result is handled
  }
  _qrScanState.rafId = requestAnimationFrame(()=>scanQRFrame(eventId));
}

function handleQRScanResult(rawText, eventId){
  const org = currentOrg();
  const memberId = parseMemberQRPayload(rawText);
  const resultEl = document.getElementById('qrScanResult');
  const statusEl = document.getElementById('qrScanStatus');

  if(!memberId || !org.members[memberId]){
    resultEl.innerHTML = `<div class="pill pill-danger" style="width:100%; justify-content:center; padding:10px;">Unrecognized QR code</div>`;
    setTimeout(()=>{ resultEl.innerHTML=''; if(_qrScanState.active) scanQRFrame(eventId); }, 1500);
    return;
  }

  const member = org.members[memberId];
  const event = org.events[eventId];
  const reg = event.registrations.find(r=>r.memberId===memberId);

  if(!reg){
    resultEl.innerHTML = `<div class="pill pill-warn" style="width:100%; justify-content:center; padding:10px;">${escapeHtml(member.name)} is not registered for this event</div>`;
    setTimeout(()=>{ resultEl.innerHTML=''; if(_qrScanState.active) scanQRFrame(eventId); }, 1800);
    return;
  }

  if(reg.checkedIn){
    resultEl.innerHTML = `<div class="pill pill-neutral" style="width:100%; justify-content:center; padding:10px;">${escapeHtml(member.name)} already checked in</div>`;
    setTimeout(()=>{ resultEl.innerHTML=''; if(_qrScanState.active) scanQRFrame(eventId); }, 1800);
    return;
  }

  // Successful check-in (reuses the same logic/points award as manual check-in)
  checkInMember(eventId, memberId);
  resultEl.innerHTML = `<div class="pill pill-success" style="width:100%; justify-content:center; padding:10px;">${icon('check')} ${escapeHtml(member.name)} checked in</div>`;
  if(navigator.vibrate) navigator.vibrate(80);
  setTimeout(()=>{ resultEl.innerHTML=''; if(_qrScanState.active) scanQRFrame(eventId); }, 1400);
}

function closeQRScanner(){
  _qrScanState.active = false;
  if(_qrScanState.rafId) cancelAnimationFrame(_qrScanState.rafId);
  if(_qrScanState.stream) _qrScanState.stream.getTracks().forEach(t=>t.stop());
  _qrScanState = { stream:null, rafId:null, active:false, onResult:null };
  closeModal('qrScannerBackdrop');
}

  return db;
}

function handleLogin(e){
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;
  btn.innerHTML = `<span class="loader"></span>`; btn.disabled = true;
  setTimeout(()=>{
    const user = DB.users[email];
    if(!user || user.password !== password){
      toast('Invalid email or password', 'error');
      btn.innerHTML = 'Log in'; btn.disabled = false;
      return;
    }
    SESSION = { email: user.email, orgId: user.orgId, name: user.name, role: user.role };
    setSession(SESSION);
    if(user.role === 'platformAdmin'){
      enterPlatformAdmin();
    } else {
      enterDashboard();
    }
  }, 500);
}

function handleSignup(e){
  e.preventDefault();
  const btn = document.getElementById('signupBtn');
  const orgName = document.getElementById('suOrgName').value.trim();
  const orgType = document.getElementById('suOrgType').value;
  const name = document.getElementById('suName').value.trim();
  const email = document.getElementById('suEmail').value.trim().toLowerCase();
  const password = document.getElementById('suPassword').value;
  if(DB.users[email]){ toast('An account with this email already exists', 'error'); return; }
  btn.innerHTML = `<span class="loader"></span>`; btn.disabled = true;
  setTimeout(()=>{
    const orgId = uid('org_');
    DB.orgs[orgId] = {
      id: orgId, name: orgName, type: orgType, logoInitial: orgName.charAt(0).toUpperCase(),
      plan:'trial', createdAt: new Date().toISOString(),
      subscriptionStatus:'active', nextPaymentDue: new Date(Date.now()+14*86400000).toISOString(),
      settings:{
        tiers:[
          { id:'standard', name:'Standard', color:'#3D5AFE', priceYear:100, benefits:'Member directory listing' },
        ],
        currency:'RM',
        pointsRules:{ perRinggitSpent:1, eventCheckIn:50, referral:200 },
        rewards:[]
      },
      members:{}, events:{}, transactions:{}, committees:{}, loyaltyLog:{},
    };
    DB.users[email] = { email, password, name, role:'owner', orgId, avatarColor: avatarColor(name) };
    persist();
    SESSION = { email, orgId, name, role:'owner' };
    setSession(SESSION);
    toast('Welcome to AssoHub! Your organization is ready.', 'success');
    enterDashboard();
  }, 600);
}

function logout(){
  clearSession();
  SESSION = null;
  switchView('view-landing');
}

          <div class="tab ${platformAdminFilter==='notice'?'active':''}" onclick="platformAdminFilter='notice'; renderPlatformAdmin();">Notice</div>
          <div class="tab ${platformAdminFilter==='suspended'?'active':''}" onclick="platformAdminFilter='suspended'; renderPlatformAdmin();">Suspended</div>
        </div>
      </div>
      <div class="card" style="overflow-x:auto;">
        <table id="paOrgsTable"></table>
      </div>
    </div>
  </div>
  `;
  renderPlatformAdminStats();
  renderPlatformAdminTable();
}

function renderPlatformAdminStats(){
  const orgs = Object.values(DB.orgs);
  const byStatus = { active:0, reminder:0, notice:0, suspended:0 };
  orgs.forEach(o => { byStatus[o.subscriptionStatus || 'active']++; });
  const totalMembers = orgs.reduce((s,o)=>s+Object.keys(o.members||{}).length, 0);

  document.getElementById('paStats').innerHTML = `
    <div class="pa-stats">
      <div class="card kpi-card"><div class="kpi-label">Total Organizations</div><div class="kpi-value">${orgs.length}</div></div>
      <div class="card kpi-card"><div class="kpi-label">Active</div><div class="kpi-value" style="color:var(--success);">${byStatus.active}</div></div>
      <div class="card kpi-card"><div class="kpi-label">Needs Attention</div><div class="kpi-value" style="color:#9A7416;">${byStatus.reminder + byStatus.notice}</div></div>
      <div class="card kpi-card"><div class="kpi-label">Suspended</div><div class="kpi-value" style="color:var(--danger);">${byStatus.suspended}</div></div>
    </div>
  `;
}

function renderPlatformAdminTable(){
  let orgs = Object.values(DB.orgs);
  if(platformAdminFilter !== 'all'){
    orgs = orgs.filter(o => (o.subscriptionStatus||'active') === platformAdminFilter);
  }
  orgs = orgs.sort((a,b)=> new Date(a.nextPaymentDue||0) - new Date(b.nextPaymentDue||0));
  const table = document.getElementById('paOrgsTable');

  if(orgs.length===0){
    table.outerHTML = `<div class="empty-state">${icon('building')}<h4>No organizations in this view</h4></div>`;
    return;
  }

  table.innerHTML = `
    <thead><tr><th>Organization</th><th>Plan</th><th>Members</th><th>Next Payment Due</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>
      ${orgs.map(o=>{
        const status = o.subscriptionStatus || 'active';
        const meta = SUBSCRIPTION_LABELS[status] || SUBSCRIPTION_LABELS.active;
        const memberCount = Object.keys(o.members||{}).length;
        const dueDays = o.nextPaymentDue ? daysUntil(o.nextPaymentDue) : null;
        return `
        <tr>
          <td>
            <div style="display:flex; align-items:center; gap:10px;">
              <div class="avatar" style="background:${avatarColor(o.name)};">${escapeHtml(o.logoInitial || o.name.charAt(0))}</div>
              <div><div style="font-weight:600;">${escapeHtml(o.name)}</div><div style="font-size:12px; color:var(--ink-faint);">${escapeHtml(o.type||'')}</div></div>
            </div>
          </td>
          <td style="text-transform:capitalize;">${escapeHtml(o.plan)}</td>
          <td>${memberCount}</td>
          <td>${o.nextPaymentDue ? fmtDate(o.nextPaymentDue) : '—'} ${dueDays!==null && dueDays<0 ? `<span class="pill pill-danger" style="margin-left:4px;">${Math.abs(dueDays)}d overdue</span>` : ''}</td>
          <td><span class="pill ${meta.pill}">${meta.label}</span></td>
          <td>
            <div style="display:flex; gap:6px; align-items:center;">
              <select onchange="updateOrgSubscriptionStatus('${o.id}', this.value)" style="padding:6px 8px; border:1.5px solid var(--line); border-radius:7px; font-size:12.5px;">
                <option value="active" ${status==='active'?'selected':''}>Active</option>
                <option value="reminder" ${status==='reminder'?'selected':''}>Reminder</option>
                <option value="notice" ${status==='notice'?'selected':''}>Notice</option>
                <option value="suspended" ${status==='suspended'?'selected':''}>Suspended</option>
              </select>
              <button class="btn-icon btn-ghost" onclick="openSetPaymentDueModal('${o.id}')" title="Set next payment due date">${icon('calendar')}</button>
            </div>
          </td>
        </tr>
      `}).join('')}
    </tbody>
  `;
}

function updateOrgSubscriptionStatus(orgId, status){
  DB.orgs[orgId].subscriptionStatus = status;
  persist();
  renderPlatformAdminStats();
  renderPlatformAdminTable();
  toast(`${DB.orgs[orgId].name} marked as ${SUBSCRIPTION_LABELS[status].label}`, 'success');
}

function openSetPaymentDueModal(orgId){
  const org = DB.orgs[orgId];
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'paymentDueBackdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-header"><h3>Set Next Payment Due — ${escapeHtml(org.name)}</h3><button class="btn-icon btn-ghost" onclick="closeModal('paymentDueBackdrop')">${icon('close')}</button></div>
      <div class="modal-body">
        <div class="field"><label>Next payment due date</label><input type="date" id="pdDate" value="${org.nextPaymentDue ? org.nextPaymentDue.slice(0,10) : ''}"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('paymentDueBackdrop')">Cancel</button>
        <button class="btn btn-primary" onclick="savePaymentDue('${orgId}')">Save</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
}

function savePaymentDue(orgId){
  const dateVal = document.getElementById('pdDate').value;
  if(!dateVal){ toast('Please pick a date', 'error'); return; }
  DB.orgs[orgId].nextPaymentDue = new Date(dateVal).toISOString();
  persist();
  closeModal('paymentDueBackdrop');
  renderPlatformAdminTable();
  toast('Payment due date updated', 'success');
}

function renderSubscriptionBanner(){
  const org = currentOrg();
  const banner = document.getElementById('subscriptionBanner');
  if(!banner || !org) return;
  const status = org.subscriptionStatus || 'active';
  const dueStr = org.nextPaymentDue ? fmtDate(org.nextPaymentDue) : '—';

  const styles = {
    reminder: { bg:'var(--brand-light)', fg:'var(--brand-dark)', icon:'bell',
      text:`Your subscription payment is due on <b>${dueStr}</b>. Renew to avoid any interruption to your account.` },
    notice: { bg:'var(--warn-light)', fg:'#7A5A0E', icon:'bell',
      text:`<b>Action needed:</b> payment was due on <b>${dueStr}</b>. Your account will be suspended if payment isn't received soon — please contact us to renew.` },
    suspended: { bg:'var(--danger-light)', fg:'var(--danger)', icon:'bell',
      text:`<b>Your account is suspended</b> due to non-payment. Contact us to reactivate — your data is safe and untouched.` },
  };

  if(status === 'active' || !styles[status]){ banner.innerHTML=''; return; }
  const s = styles[status];
  banner.innerHTML = `
    <div style="background:${s.bg}; color:${s.fg}; padding:12px 28px; font-size:13.5px; display:flex; align-items:center; gap:10px; border-bottom:1px solid rgba(0,0,0,0.06);">

    </div>
  `;
}

function renderSidebarNav(){
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = NAV_ITEMS.map(item => `
    <div class="nav-item ${currentPage===item.id ? 'active':''}" onclick="navigateTo('${item.id}')">
      ${icon(item.icon)}<span>${item.label}</span>
    </div>
  `).join('');

function navigateTo(page){
  currentPage = page;
  renderSidebarNav();
  document.getElementById('topbarTitle').textContent = NAV_ITEMS.find(n=>n.id===page)?.label || '';
  const content = document.getElementById('pageContent');
  const org = currentOrg();

  if(org && org.subscriptionStatus === 'suspended' && page !== 'settings'){
    renderSuspendedScreen(content);
    return;
  }

  if(page==='overview') renderOverview(content);
  else if(page==='members') renderMembers(content);
  else if(page==='events') renderEvents(content);
  else if(page==='loyalty') renderLoyalty(content);
  else if(page==='accounting') renderAccounting(content);
  else if(page==='committees') renderCommittees(content);
  else if(page==='settings') renderSettings(content);
}

            <div class="mini-row">
              <div class="avatar" style="background:${avatarColor(m.name)};">${initials(m.name)}</div>
              <div class="meta"><div class="title">${escapeHtml(m.name)}</div><div class="sub">${escapeHtml(tier.name||'')}</div></div>
              <span class="pill ${d<0?'pill-danger':d<=14?'pill-warn':'pill-neutral'}">${d<0?'Expired':d+'d left'}</span>

          <div class="panel-head"><h3>Members by Tier</h3></div>

            <div style="margin-bottom:14px;">

            </div>
          `}).join('')}
        </div>
      </div>
    </div>
  `;
}

let membersFilter = { search:'', tier:'all', status:'all' };

function renderMembers(el){
  const org = currentOrg();
  el.innerHTML = `
    <div class="page-head">
      <div><h1>Members</h1><div class="sub">${Object.keys(org.members).length} total members across ${org.settings.tiers.length} tiers</div></div>
      <div class="page-actions">
        <button class="btn btn-secondary" onclick="openImportModal()">${icon('upload')} Import</button>
        <button class="btn btn-primary" onclick="openMemberModal()">${icon('plus')} Add Member</button>
      </div>
    </div>
    <div class="toolbar">
      <div class="search-box" style="width:280px;">${icon('search')}<input type="text" id="memberSearch" placeholder="Search by name, company, email..." value="${escapeHtml(membersFilter.search)}"></div>
      <select id="tierFilter" style="padding:9px 12px; border:1.5px solid var(--line); border-radius:9px; font-size:13.5px; background:#fff;">
        <option value="all">All tiers</option>
        ${org.settings.tiers.map(t=>`<option value="${t.id}" ${membersFilter.tier===t.id?'selected':''}>${escapeHtml(t.name)}</option>`).join('')}
      </select>
      <select id="statusFilter" style="padding:9px 12px; border:1.5px solid var(--line); border-radius:9px; font-size:13.5px; background:#fff;">
        <option value="all">All statuses</option>
        <option value="active" ${membersFilter.status==='active'?'selected':''}>Active</option>
        <option value="expired" ${membersFilter.status==='expired'?'selected':''}>Expired</option>
      </select>
    </div>
    <div class="card" style="overflow-x:auto;">
      <table id="membersTable"></table>
    </div>
  `;
  document.getElementById('memberSearch').addEventListener('input', e=>{ membersFilter.search = e.target.value; renderMembersTable(); });
  document.getElementById('tierFilter').addEventListener('change', e=>{ membersFilter.tier = e.target.value; renderMembersTable(); });
  document.getElementById('statusFilter').addEventListener('change', e=>{ membersFilter.status = e.target.value; renderMembersTable(); });
  renderMembersTable();
}

function getFilteredMembers(){
  const org = currentOrg();
  const tierMap = {}; org.settings.tiers.forEach(t=>tierMap[t.id]=t);
  let list = Object.values(org.members);
  if(membersFilter.search){
    const q = membersFilter.search.toLowerCase();
    list = list.filter(m => m.name.toLowerCase().includes(q) || (m.company||'').toLowerCase().includes(q) || (m.email||'').toLowerCase().includes(q) || (m.memberNo||'').toLowerCase().includes(q));
  }
  if(membersFilter.tier !== 'all') list = list.filter(m=>m.tier===membersFilter.tier);
  if(membersFilter.status !== 'all') list = list.filter(m=>m.status===membersFilter.status);
  return list.sort((a,b)=>a.name.localeCompare(b.name));
}

function renderMembersTable(){
  const org = currentOrg();
  const tierMap = {}; org.settings.tiers.forEach(t=>tierMap[t.id]=t);
  const list = getFilteredMembers();
  const table = document.getElementById('membersTable');
  if(list.length===0){
    table.outerHTML = `<div class="empty-state">${icon('members')}<h4>No members found</h4><p>Try adjusting your filters or add a new member.</p></div>`;
    return;
  }
  table.innerHTML = `
    <thead><tr><th>Member</th><th>Tier</th><th>Status</th><th>Joined</th><th>Expires</th><th>Points</th><th></th></tr></thead>
    <tbody>
      ${list.map(m=>{
        const tier = tierMap[m.tier] || {name:'—',color:'#999'};
        const d = daysUntil(m.expiryDate);
        return `
        <tr style="cursor:pointer;" onclick="openMemberProfile('${m.id}')">
          <td>
            <div style="display:flex; align-items:center; gap:10px;">
              <div class="avatar" style="background:${avatarColor(m.name)};">${initials(m.name)}</div>
              <div><div style="font-weight:600;">${escapeHtml(m.name)}</div><div style="font-size:12px; color:var(--ink-faint);">${escapeHtml(m.company||m.email)}</div></div>
            </div>
          </td>
          <td><span class="tier-badge" style="background:${tier.color};">${escapeHtml(tier.name)}</span></td>
          <td><span class="pill ${m.status==='active'?'pill-success':'pill-danger'}">${m.status==='active'?'Active':'Expired'}</span></td>
          <td>${fmtDate(m.joinDate)}</td>
          <td>${fmtDate(m.expiryDate)} ${d>=0 && d<=30 ? `<span class="pill pill-warn" style="margin-left:6px;">${d}d</span>`:''}</td>
          <td class="mono">${m.points||0}</td>
          <td onclick="event.stopPropagation();">
            <button class="btn-icon btn-ghost" onclick="openMemberModal('${m.id}')">${icon('edit')}</button>
          </td>
        </tr>
      `}).join('')}
    </tbody>
  `;
}

      </div>
    </div>

function saveMember(memberId){
  const org = currentOrg();
  const name = document.getElementById('mfName').value.trim();
  if(!name){ toast('Name is required', 'error'); return; }
  const data = {
    name,
    company: document.getElementById('mfCompany').value.trim(),
    email: document.getElementById('mfEmail').value.trim(),
    phone: document.getElementById('mfPhone').value.trim(),
    tier: document.getElementById('mfTier').value,
    status: document.getElementById('mfStatus').value,
    joinDate: new Date(document.getElementById('mfJoin').value).toISOString(),
    expiryDate: new Date(document.getElementById('mfExpiry').value).toISOString(),
    notes: document.getElementById('mfNotes').value.trim(),
  };
  if(memberId){
    Object.assign(org.members[memberId], data);
    toast('Member updated', 'success');
  } else {
    const id = uid('mem_');
    const memberCount = Object.keys(org.members).length;
    org.members[id] = { id, ...data, points:0, memberNo: org.id.slice(0,3).toUpperCase()+'-'+String(1000+memberCount) };
    toast('Member added', 'success');
  }
  persist();
  closeModal('memberModalBackdrop');
  if(currentPage==='members') renderMembersTable();
  if(currentPage==='overview') navigateTo('overview');
}

function deleteMember(memberId){
  if(!confirm('Delete this member? This cannot be undone.')) return;
  const org = currentOrg();
  delete org.members[memberId];
  persist();
  closeModal('memberModalBackdrop');
  closeModal('memberProfileBackdrop');
  renderMembersTable();
  toast('Member deleted');
}

function closeModal(id){
  const el = document.getElementById(id);
  if(el) el.remove();
}

        <div class="tabs" style="margin-top:24px;">

function switchProfileTab(tab, btn){
  document.querySelectorAll('#memberProfileBackdrop .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const { memberTxns, memberEvents, memberLoyalty, org } = window._profileData;
  const content = document.getElementById('profileTabContent');
  if(tab==='hist'){
    content.innerHTML = memberTxns.length===0 ? `<p style="color:var(--ink-faint); font-size:13.5px;">No transactions recorded.</p>` :
      memberTxns.map(t=>`<div class="mini-row"><div class="meta"><div class="title">${escapeHtml(t.category)}</div><div class="sub">${fmtDate(t.date)}</div></div><span style="font-weight:700;">${fmtMoney(t.amount, org.settings.currency)}</span></div>`).join('');
  } else if(tab==='evt'){
    content.innerHTML = memberEvents.length===0 ? `<p style="color:var(--ink-faint); font-size:13.5px;">No events attended.</p>` :
      memberEvents.map(e=>`<div class="mini-row"><div class="meta"><div class="title">${escapeHtml(e.title)}</div><div class="sub">${fmtDate(e.date)}</div></div><span class="pill pill-neutral">${escapeHtml(e.location)}</span></div>`).join('');
  } else {
    content.innerHTML = memberLoyalty.length===0 ? `<p style="color:var(--ink-faint); font-size:13.5px;">No points activity.</p>` :
      memberLoyalty.map(l=>`<div class="mini-row"><div class="meta"><div class="title">${escapeHtml(l.reason)}</div><div class="sub">${fmtDate(l.date)}</div></div><span style="font-weight:700; color:${l.points<0?'var(--danger)':'var(--success)'};">${l.points>0?'+':''}${l.points} pts</span></div>`).join('');
  }
}

function openImportModal(){
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'importModalBackdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-header"><h3>Bulk Import Members</h3><button class="btn-icon btn-ghost" onclick="closeModal('importModalBackdrop')">${icon('close')}</button></div>
      <div class="modal-body">
        <p style="font-size:13.5px; color:var(--ink-soft); margin-bottom:14px;">Paste CSV data with columns: <span class="mono" style="background:var(--line-soft); padding:2px 6px; border-radius:4px;">name,email,phone,company,tier</span></p>
        <div class="field"><textarea id="csvInput" rows="8" placeholder="Jane Doe,jane@acme.com,+60123456789,Acme Sdn Bhd,standard
John Smith,john@beta.com,+60198765432,Beta Corp,gold"></textarea></div>
        <div class="hint">Tier values must match an existing tier ID (see Settings → Tiers). Unmatched rows default to the first tier.</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('importModalBackdrop')">Cancel</button>
        <button class="btn btn-primary" onclick="processImport()">Import Members</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
}

function processImport(){
  const org = currentOrg();
  const raw = document.getElementById('csvInput').value.trim();
  if(!raw){ toast('Please paste some CSV data', 'error'); return; }
  const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const defaultTier = org.settings.tiers[0]?.id || 'standard';
  let count = 0;
  lines.forEach(line=>{
    const [name, email, phone, company, tier] = line.split(',').map(s=>s?.trim());
    if(!name) return;
    const id = uid('mem_');
    const memberCount = Object.keys(org.members).length;
    org.members[id] = {
      id, name, email: email||'', phone: phone||'', company: company||'',
      tier: org.settings.tiers.find(t=>t.id===tier) ? tier : defaultTier,
      status:'active', joinDate: new Date().toISOString(), expiryDate: new Date(Date.now()+365*86400000).toISOString(),
      points:0, memberNo: org.id.slice(0,3).toUpperCase()+'-'+String(1000+memberCount), notes:''
    };
    count++;
  });
  persist();
  closeModal('importModalBackdrop');
  if(currentPage==='members') renderMembersTable();
  toast(`Imported ${count} member${count!==1?'s':''}`, 'success');
}

      </div>

function openEventModal(eventId){

  backdrop.className = 'modal-backdrop';
  backdrop.id = 'eventModalBackdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-header"><h3>${e?'Edit Event':'Create Event'}</h3><button class="btn-icon btn-ghost" onclick="closeModal('eventModalBackdrop')">${icon('close')}</button></div>
      <div class="modal-body">
        <div class="field"><label>Event title</label><input type="text" id="efTitle" value="${e?escapeHtml(e.title):''}" placeholder="Annual Gala Dinner 2026"></div>
        <div class="field-row">
          <div class="field"><label>Date</label><input type="date" id="efDate" value="${e?e.date.slice(0,10):''}"></div>
          <div class="field"><label>Capacity</label><input type="number" id="efCapacity" value="${e?e.capacity:100}" min="1"></div>
        </div>
        <div class="field"><label>Location</label><input type="text" id="efLocation" value="${e?escapeHtml(e.location):''}" placeholder="Grand Ballroom, Sunway Resort"></div>
        <div class="field"><label>Ticket price (${org.settings.currency})</label><input type="number" id="efPrice" value="${e?e.price:0}" min="0" step="0.01"></div>
        <div class="field"><label>Description</label><textarea id="efDesc" rows="3" placeholder="Event details...">${e?escapeHtml(e.description||''):''}</textarea></div>
      </div>
      <div class="modal-footer">
        ${e ? `<button class="btn btn-danger" onclick="deleteEvent('${e.id}')">Delete</button>` : ''}
        <button class="btn btn-secondary" onclick="closeModal('eventModalBackdrop')">Cancel</button>
        <button class="btn btn-primary" onclick="saveEvent('${e?e.id:''}')">${e?'Save Changes':'Create Event'}</button>
      </div>
    </div>

}

function saveEvent(eventId){
  const org = currentOrg();
  const title = document.getElementById('efTitle').value.trim();
  const dateVal = document.getElementById('efDate').value;
  if(!title || !dateVal){ toast('Title and date are required', 'error'); return; }
  const date = new Date(dateVal).toISOString();
  const data = {
    title, date,
    location: document.getElementById('efLocation').value.trim(),
    capacity: Number(document.getElementById('efCapacity').value) || 100,
    price: Number(document.getElementById('efPrice').value) || 0,
    description: document.getElementById('efDesc').value.trim(),
    status: new Date(date) < new Date() ? 'completed' : 'upcoming',
  };
  if(eventId){
    Object.assign(org.events[eventId], data);
    toast('Event updated', 'success');
  } else {
    const id = uid('evt_');
    org.events[id] = { id, ...data, registrations:[] };
    toast('Event created', 'success');
  }
  persist();
  closeModal('eventModalBackdrop');
  if(currentPage==='events') renderEvents(document.getElementById('pageContent'));
}

function deleteEvent(eventId){
  if(!confirm('Delete this event? Registrations will be lost.')) return;
  const org = currentOrg();
  delete org.events[eventId];
  persist();
  closeModal('eventModalBackdrop');
  closeModal('eventDetailBackdrop');
  renderEvents(document.getElementById('pageContent'));
  toast('Event deleted');
}

      </div>

  document.body.appendChild(backdrop);
  renderAttendeeList(eventId);

function renderAttendeeList(eventId){
  const org = currentOrg();
  const e = org.events[eventId];
  const list = document.getElementById('attendeeList');
  if(e.registrations.length===0){
    list.innerHTML = `<p style="color:var(--ink-faint); font-size:13.5px; padding:16px 0;">No registrations yet.</p>`;
    return;
  }
  list.innerHTML = e.registrations.map(r=>{
    const m = org.members[r.memberId];
    if(!m) return '';
    return `
    <div class="mini-row">
      <div class="avatar" style="background:${avatarColor(m.name)}; width:32px; height:32px; font-size:11px;">${initials(m.name)}</div>
      <div class="meta"><div class="title">${escapeHtml(m.name)}</div><div class="sub">${escapeHtml(m.company||'')}</div></div>
      ${r.checkedIn
        ? `<span class="pill pill-success">${icon('check')} Checked in</span>`
        : `<button class="btn btn-sm btn-secondary" onclick="checkInMember('${eventId}','${r.memberId}')">${icon('qr')} Check in</button>`}
    </div>
  `}).join('');
}

function checkInMember(eventId, memberId){
  const org = currentOrg();
  const e = org.events[eventId];
  const reg = e.registrations.find(r=>r.memberId===memberId);
  if(reg){
    reg.checkedIn = true;
    reg.checkedInAt = new Date().toISOString();
    // award loyalty points
    const pts = org.settings.pointsRules.eventCheckIn || 0;
    if(pts > 0){
      org.members[memberId].points = (org.members[memberId].points||0) + pts;
      const lg = uid('lg_');
      org.loyaltyLog[lg] = { id:lg, memberId, points:pts, reason:'Event check-in: '+e.title, date:new Date().toISOString() };
    }
    persist();
    renderAttendeeList(eventId);
    toast('Checked in · +'+pts+' points awarded', 'success');
  }
}

function openRegisterMemberModal(eventId){
  const org = currentOrg();
  const e = org.events[eventId];
  const registeredIds = new Set(e.registrations.map(r=>r.memberId));
  const available = Object.values(org.members).filter(m=>!registeredIds.has(m.id));
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'registerMemberBackdrop';
  backdrop.style.zIndex = 1100;
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-header"><h3>Register Member</h3><button class="btn-icon btn-ghost" onclick="closeModal('registerMemberBackdrop')">${icon('close')}</button></div>
      <div class="modal-body">
        <div class="field"><label>Select member</label>
          <select id="regMemberSelect">
            ${available.length===0 ? '<option>All members already registered</option>' :
            available.map(m=>`<option value="${m.id}">${escapeHtml(m.name)} — ${escapeHtml(m.company||m.email)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('registerMemberBackdrop')">Cancel</button>
        <button class="btn btn-primary" ${available.length===0?'disabled':''} onclick="registerMemberToEvent('${eventId}')">Register</button>
      </div>

  document.body.appendChild(backdrop);
}

function registerMemberToEvent(eventId){
  const org = currentOrg();
  const memberId = document.getElementById('regMemberSelect').value;
  org.events[eventId].registrations.push({ memberId, registeredAt:new Date().toISOString(), checkedIn:false, checkedInAt:null });
  persist();
  closeModal('registerMemberBackdrop');
  renderAttendeeList(eventId);
  toast('Member registered', 'success');
}

function renderAcctContent(){
  const org = currentOrg();
  const txns = Object.values(org.transactions);
  const content = document.getElementById('acctContent');
  const income = txns.filter(t=>t.type!=='expense');
  const expenses = txns.filter(t=>t.type==='expense');
  const totalIncome = income.reduce((s,t)=>s+t.amount,0);
  const totalExpense = expenses.reduce((s,t)=>s+t.amount,0);
  const net = totalIncome - totalExpense;

  if(acctTab==='overview'){
    const byCategory = {};
    income.forEach(t=>{ byCategory[t.category] = (byCategory[t.category]||0) + t.amount; });
    const expByCategory = {};
    expenses.forEach(t=>{ expByCategory[t.category] = (expByCategory[t.category]||0) + t.amount; });

    content.innerHTML = `
      <div class="kpi-grid">
        <div class="card kpi-card"><div class="kpi-label">Total Income</div><div class="kpi-value" style="color:var(--success);">${fmtMoney(totalIncome, org.settings.currency)}</div></div>
        <div class="card kpi-card"><div class="kpi-label">Total Expenses</div><div class="kpi-value" style="color:var(--danger);">${fmtMoney(totalExpense, org.settings.currency)}</div></div>
        <div class="card kpi-card"><div class="kpi-label">Net Balance</div><div class="kpi-value" style="color:${net>=0?'var(--success)':'var(--danger)'};">${fmtMoney(net, org.settings.currency)}</div></div>
        <div class="card kpi-card"><div class="kpi-label">Transactions</div><div class="kpi-value">${txns.length}</div></div>
      </div>
      <div class="dash-grid">
        <div class="card panel">
          <div class="panel-head"><h3>Income by Category</h3></div>
          ${Object.keys(byCategory).length===0 ? '<p style="color:var(--ink-faint); font-size:13.5px;">No income recorded.</p>' :
          Object.entries(byCategory).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
            const pct = totalIncome ? Math.round(amt/totalIncome*100) : 0;
            return `<div style="margin-bottom:14px;">
              <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;"><span style="font-weight:600;">${escapeHtml(cat)}</span><span>${fmtMoney(amt,org.settings.currency)}</span></div>
              <div style="height:6px; background:var(--line-soft); border-radius:10px; overflow:hidden;"><div style="height:100%; width:${pct}%; background:var(--success); border-radius:10px;"></div></div>
            </div>`;
          }).join('')}
        </div>
        <div class="card panel">
          <div class="panel-head"><h3>Expenses by Category</h3></div>
          ${Object.keys(expByCategory).length===0 ? '<p style="color:var(--ink-faint); font-size:13.5px;">No expenses recorded.</p>' :
          Object.entries(expByCategory).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
            const pct = totalExpense ? Math.round(amt/totalExpense*100) : 0;
            return `<div style="margin-bottom:14px;">
              <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;"><span style="font-weight:600;">${escapeHtml(cat)}</span><span>${fmtMoney(amt,org.settings.currency)}</span></div>
              <div style="height:6px; background:var(--line-soft); border-radius:10px; overflow:hidden;"><div style="height:100%; width:${pct}%; background:var(--danger); border-radius:10px;"></div></div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `;
  } else {
    const list = (acctTab==='income' ? income : expenses).sort((a,b)=>new Date(b.date)-new Date(a.date));
    content.innerHTML = `
      <div class="card" style="overflow-x:auto;">
        ${list.length===0 ? `<div class="empty-state">${icon('accounting')}<h4>No ${acctTab} recorded</h4></div>` : `
        <table>
          <thead><tr><th>Date</th><th>Category</th><th>Member</th><th>Note</th><th style="text-align:right;">Amount</th><th></th></tr></thead>
          <tbody>
            ${list.map(t=>{
              const m = t.memberId ? org.members[t.memberId] : null;
              return `<tr>
                <td>${fmtDate(t.date)}</td>
                <td>${escapeHtml(t.category)}</td>
                <td>${m ? escapeHtml(m.name) : '—'}</td>
                <td style="color:var(--ink-faint);">${escapeHtml(t.note||'—')}</td>
                <td style="text-align:right; font-weight:700; color:${t.type==='expense'?'var(--danger)':'var(--success)'};">${t.type==='expense'?'−':'+'}${fmtMoney(t.amount,org.settings.currency)}</td>
                <td><button class="btn-icon btn-ghost" onclick="deleteTxn('${t.id}')">${icon('trash')}</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`}
      </div>
    `;
  }
}

function openTxnModal(){
  const org = currentOrg();
  const members = Object.values(org.members);
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'txnModalBackdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-header"><h3>Add Transaction</h3><button class="btn-icon btn-ghost" onclick="closeModal('txnModalBackdrop')">${icon('close')}</button></div>
      <div class="modal-body">
        <div class="field"><label>Type</label>
          <select id="tfType" onchange="document.getElementById('tfMemberField').style.display = this.value==='expense'?'none':'block';">
            <option value="dues">Membership Dues</option>
            <option value="donation">Donation / Sponsorship</option>
            <option value="event">Event Ticket Income</option>
            <option value="expense">Expense</option>
          </select>
        </div>
        <div class="field-row">
          <div class="field"><label>Category</label><input type="text" id="tfCategory" placeholder="e.g. Membership Dues, Office Rental"></div>
          <div class="field"><label>Amount (${org.settings.currency})</label><input type="number" id="tfAmount" min="0" step="0.01" placeholder="0.00"></div>
        </div>
        <div class="field" id="tfMemberField"><label>Member (optional)</label>
          <select id="tfMember"><option value="">— None —</option>${members.map(m=>`<option value="${m.id}">${escapeHtml(m.name)}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Date</label><input type="date" id="tfDate" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="field"><label>Note</label><input type="text" id="tfNote" placeholder="Optional note"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('txnModalBackdrop')">Cancel</button>
        <button class="btn btn-primary" onclick="saveTxn()">Save Transaction</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
}

function saveTxn(){
  const org = currentOrg();
  const type = document.getElementById('tfType').value;
  const category = document.getElementById('tfCategory').value.trim();
  const amount = Number(document.getElementById('tfAmount').value);
  if(!category || !amount){ toast('Category and amount are required', 'error'); return; }
  const id = uid('txn_');
  org.transactions[id] = {
    id, type, category, amount,
    memberId: type==='expense' ? null : (document.getElementById('tfMember').value || null),
    date: new Date(document.getElementById('tfDate').value).toISOString(),
    note: document.getElementById('tfNote').value.trim(),
    status:'paid'
  };
  persist();
  closeModal('txnModalBackdrop');
  if(currentPage==='accounting') renderAcctContent();
  toast('Transaction recorded', 'success');
}

function deleteTxn(txnId){
  if(!confirm('Delete this transaction?')) return;
  const org = currentOrg();
  delete org.transactions[txnId];
  persist();
  renderAcctContent();
  toast('Transaction deleted');
}

function exportTransactionsCSV(){
  const org = currentOrg();
  const txns = Object.values(org.transactions).sort((a,b)=>new Date(a.date)-new Date(b.date));
  let csv = 'Date,Type,Category,Member,Amount,Note\n';
  txns.forEach(t=>{
    const m = t.memberId ? org.members[t.memberId] : null;
    csv += [fmtDate(t.date), t.type, t.category, m?m.name:'', t.amount, t.note||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',') + '\n';
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${org.name.replace(/\s+/g,'_')}_transactions.csv`;
  a.click();
  toast('CSV exported', 'success');
}

/* ============================================================
   COMMITTEES MODULE
   ============================================================ */
function renderCommittees(el){
  const org = currentOrg();
  el.innerHTML = `
    <div class="page-head">
      <div><h1>Committees</h1><div class="sub">${Object.keys(org.committees).length} committees tracked</div></div>
      <div class="page-actions"><button class="btn btn-primary" onclick="openCommitteeModal()">${icon('plus')} New Committee</button></div>
    </div>
    <div id="committeesGrid"></div>
  `;
  renderCommitteesGrid();
}

function renderCommitteesGrid(){
  const org = currentOrg();
  const grid = document.getElementById('committeesGrid');
  const committees = Object.values(org.committees);
  if(committees.length===0){
    grid.innerHTML = `<div class="empty-state">${icon('committee')}<h4>No committees yet</h4><p>Create a board or committee to track roles and terms.</p></div>`;
    return;
  }
  grid.innerHTML = committees.map(c=>`
    <div class="card panel">
      <div class="panel-head">
        <div><h3>${escapeHtml(c.name)}</h3><div style="font-size:13px; color:var(--ink-faint); margin-top:2px;">${escapeHtml(c.description||'')}</div></div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-sm btn-secondary" onclick="openAddCommitteeMemberModal('${c.id}')">${icon('plus')} Add Member</button>
          <button class="btn-icon btn-ghost" onclick="deleteCommittee('${c.id}')">${icon('trash')}</button>
        </div>
      </div>
      ${c.members.length===0 ? `<p style="color:var(--ink-faint); font-size:13.5px;">No members assigned.</p>` : `
      <table>
        <thead><tr><th>Member</th><th>Role</th><th>Term</th><th></th></tr></thead>
        <tbody>
          ${c.members.map((cm,idx)=>{
            const m = org.members[cm.memberId];
            if(!m) return '';
            const termActive = new Date(cm.termEnd) >= new Date();
            return `<tr>
              <td><div style="display:flex; align-items:center; gap:10px;"><div class="avatar" style="background:${avatarColor(m.name)}; width:30px; height:30px; font-size:11px;">${initials(m.name)}</div>${escapeHtml(m.name)}</div></td>
              <td><span class="pill pill-brand">${escapeHtml(cm.role)}</span></td>
              <td>${fmtDateShort(cm.termStart)} – ${fmtDateShort(cm.termEnd)} ${!termActive ? '<span class="pill pill-danger" style="margin-left:6px;">Ended</span>':''}</td>
              <td><button class="btn-icon btn-ghost" onclick="removeCommitteeMember('${c.id}', ${idx})">${icon('trash')}</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`}
    </div>
  `).join('');
}

function openCommitteeModal(){
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'committeeModalBackdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-header"><h3>New Committee</h3><button class="btn-icon btn-ghost" onclick="closeModal('committeeModalBackdrop')">${icon('close')}</button></div>
      <div class="modal-body">
        <div class="field"><label>Committee name</label><input type="text" id="cfName" placeholder="e.g. Events Committee"></div>
        <div class="field"><label>Description</label><textarea id="cfDesc" rows="2" placeholder="What does this committee do?"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('committeeModalBackdrop')">Cancel</button>
        <button class="btn btn-primary" onclick="saveCommittee()">Create Committee</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
}

function saveCommittee(){
  const org = currentOrg();
  const name = document.getElementById('cfName').value.trim();
  if(!name){ toast('Name is required', 'error'); return; }
  const id = uid('com_');
  org.committees[id] = { id, name, description: document.getElementById('cfDesc').value.trim(), members:[] };
  persist();
  closeModal('committeeModalBackdrop');
  renderCommitteesGrid();
  toast('Committee created', 'success');
}

function deleteCommittee(committeeId){
  if(!confirm('Delete this committee?')) return;
  const org = currentOrg();
  delete org.committees[committeeId];
  persist();
  renderCommitteesGrid();
  toast('Committee deleted');
}

function openAddCommitteeMemberModal(committeeId){
  const org = currentOrg();
  const members = Object.values(org.members);
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'addCommitteeMemberBackdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-header"><h3>Add Committee Member</h3><button class="btn-icon btn-ghost" onclick="closeModal('addCommitteeMemberBackdrop')">${icon('close')}</button></div>
      <div class="modal-body">
        <div class="field"><label>Member</label>
          <select id="cmMember">${members.map(m=>`<option value="${m.id}">${escapeHtml(m.name)}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Role</label><input type="text" id="cmRole" placeholder="e.g. Chair, Treasurer, Member"></div>
        <div class="field-row">
          <div class="field"><label>Term start</label><input type="date" id="cmStart" value="${new Date().toISOString().slice(0,10)}"></div>
          <div class="field"><label>Term end</label><input type="date" id="cmEnd" value="${new Date(Date.now()+365*86400000).toISOString().slice(0,10)}"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('addCommitteeMemberBackdrop')">Cancel</button>
        <button class="btn btn-primary" onclick="addCommitteeMember('${committeeId}')">Add</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
}

function addCommitteeMember(committeeId){
  const org = currentOrg();
  const role = document.getElementById('cmRole').value.trim();
  if(!role){ toast('Role is required', 'error'); return; }
  org.committees[committeeId].members.push({
    memberId: document.getElementById('cmMember').value,
    role,
    termStart: document.getElementById('cmStart').value,
    termEnd: document.getElementById('cmEnd').value,
  });
  persist();
  closeModal('addCommitteeMemberBackdrop');
  renderCommitteesGrid();
  toast('Committee member added', 'success');
}

function removeCommitteeMember(committeeId, idx){
  const org = currentOrg();
  org.committees[committeeId].members.splice(idx,1);
  persist();
  renderCommitteesGrid();
  toast('Removed from committee');
}

/* ============================================================
   SETTINGS MODULE
   ============================================================ */
let settingsTab = 'org';

function renderSettings(el){
  const org = currentOrg();
  el.innerHTML = `
    <div class="page-head"><div><h1>Settings</h1><div class="sub">Manage your organization, tiers, and billing</div></div></div>
    <div class="tabs">
      <div class="tab ${settingsTab==='org'?'active':''}" onclick="settingsTab='org'; renderSettings(document.getElementById('pageContent'))">Organization</div>
      <div class="tab ${settingsTab==='tiers'?'active':''}" onclick="settingsTab='tiers'; renderSettings(document.getElementById('pageContent'))">Membership Tiers</div>
      <div class="tab ${settingsTab==='billing'?'active':''}" onclick="settingsTab='billing'; renderSettings(document.getElementById('pageContent'))">Billing &amp; Plan</div>
    </div>
    <div id="settingsContent"></div>
  `;
  renderSettingsContent();
}

function renderSettingsContent(){
  const org = currentOrg();
  const content = document.getElementById('settingsContent');
  if(settingsTab==='org'){
    content.innerHTML = `
      <div class="card panel" style="max-width:560px;">
        <div class="field"><label>Organization name</label><input type="text" id="ofName" value="${escapeHtml(org.name)}"></div>
        <div class="field"><label>Organization type</label>
          <select id="ofType">
            ${['Chamber of Commerce','Professional Society','Member Club','Association','Alumni Association','Other'].map(t=>`<option ${org.type===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Currency</label>
          <select id="ofCurrency">
            ${['RM','SGD','USD'].map(c=>`<option ${org.settings.currency===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-primary" onclick="saveOrgSettings()">Save Changes</button>
      </div>
    `;
  } else if(settingsTab==='tiers'){
    content.innerHTML = `
      <div class="page-actions" style="margin-bottom:16px; justify-content:flex-start;"><button class="btn btn-secondary btn-sm" onclick="openTierModal()">${icon('plus')} Add Tier</button></div>
      <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px;">
        ${org.settings.tiers.map(t=>`
          <div class="card" style="padding:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
              <span class="tier-badge" style="background:${t.color};">${escapeHtml(t.name)}</span>
              <div style="display:flex; gap:6px;">
                <button class="btn-icon btn-ghost" onclick="openTierModal('${t.id}')">${icon('edit')}</button>
                <button class="btn-icon btn-ghost" onclick="deleteTier('${t.id}')">${icon('trash')}</button>
              </div>
            </div>
            <div style="font-family:var(--font-display); font-size:20px; font-weight:600; margin-bottom:6px;">${fmtMoney(t.priceYear, org.settings.currency)}<span style="font-size:13px; font-weight:400; color:var(--ink-faint);">/year</span></div>
            <div style="font-size:13px; color:var(--ink-soft);">${escapeHtml(t.benefits||'')}</div>
          </div>
        `).join('')}
      </div>
    `;
  } else {
    const subStatus = org.subscriptionStatus || 'active';
    const subMeta = SUBSCRIPTION_LABELS[subStatus] || SUBSCRIPTION_LABELS.active;
    content.innerHTML = `
      <div class="card panel" style="max-width:560px;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
          <div>
            <div style="font-size:13px; color:var(--ink-faint); font-weight:600;">CURRENT PLAN</div>
            <div style="font-family:var(--font-display); font-size:24px; font-weight:600; text-transform:capitalize;">${escapeHtml(org.plan)}</div>
          </div>
          <span class="pill ${subMeta.pill}" style="font-size:13px; padding:6px 14px;">${subMeta.label}</span>
        </div>
        <div style="font-size:13px; color:var(--ink-faint); margin-bottom:20px;">Next payment due: <b style="color:var(--ink-soft);">${org.nextPaymentDue ? fmtDate(org.nextPaymentDue) : '—'}</b></div>
        <div style="border-top:1px solid var(--line-soft); padding-top:18px;">
          <p style="font-size:13.5px; color:var(--ink-soft); margin-bottom:16px;">Upgrade or change your plan to unlock more members and features.</p>
          <div style="display:flex; gap:10px;">
            <button class="btn btn-secondary" onclick="changePlan('starter')">Starter — RM149/mo</button>
            <button class="btn btn-primary" onclick="changePlan('growth')">Growth — RM399/mo</button>
          </div>
        </div>
        <div style="border-top:1px solid var(--line-soft); padding-top:18px; margin-top:18px;">
          <p style="font-size:13px; color:var(--ink-faint);">Questions about billing? <a href="mailto:web3studiotech@gmail.com?subject=AssoHub Billing - ${encodeURIComponent(org.name)}" style="color:var(--brand); font-weight:600;">Contact us</a></p>
        </div>
      </div>
    `;
  }
}

function saveOrgSettings(){
  const org = currentOrg();
  org.name = document.getElementById('ofName').value.trim();
  org.type = document.getElementById('ofType').value;
  org.settings.currency = document.getElementById('ofCurrency').value;
  org.logoInitial = org.name.charAt(0).toUpperCase();
  persist();
  renderDashboardShell();
  navigateTo('settings');
  toast('Organization settings saved', 'success');
}

function changePlan(plan){
  const org = currentOrg();
  org.plan = plan;
  persist();
  renderDashboardShell();
  navigateTo('settings');
  toast('Plan updated to '+plan, 'success');
}

function openTierModal(tierId){
  const org = currentOrg();
  const t = tierId ? org.settings.tiers.find(x=>x.id===tierId) : null;
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'tierModalBackdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div class="modal-header"><h3>${t?'Edit Tier':'Add Tier'}</h3><button class="btn-icon btn-ghost" onclick="closeModal('tierModalBackdrop')">${icon('close')}</button></div>
      <div class="modal-body">
        <div class="field"><label>Tier name</label><input type="text" id="tfTName" value="${t?escapeHtml(t.name):''}" placeholder="e.g. Gold"></div>
        <div class="field-row">
          <div class="field"><label>Annual price</label><input type="number" id="tfTPrice" value="${t?t.priceYear:0}" min="0"></div>
          <div class="field"><label>Color</label><input type="color" id="tfTColor" value="${t?t.color:'#3D5AFE'}" style="height:42px; padding:4px;"></div>
        </div>
        <div class="field"><label>Benefits</label><textarea id="tfTBenefits" rows="2" placeholder="What members get at this tier">${t?escapeHtml(t.benefits||''):''}</textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('tierModalBackdrop')">Cancel</button>
        <button class="btn btn-primary" onclick="saveTier('${t?t.id:''}')">Save Tier</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
}

function saveTier(tierId){
  const org = currentOrg();
  const name = document.getElementById('tfTName').value.trim();
  if(!name){ toast('Name is required', 'error'); return; }
  const data = {
    name, priceYear: Number(document.getElementById('tfTPrice').value)||0,
    color: document.getElementById('tfTColor').value,
    benefits: document.getElementById('tfTBenefits').value.trim(),
  };
  if(tierId){
    Object.assign(org.settings.tiers.find(t=>t.id===tierId), data);
  } else {
    org.settings.tiers.push({ id: uid('tier_'), ...data });
  }
  persist();
  closeModal('tierModalBackdrop');
  renderSettingsContent();
  toast('Tier saved', 'success');
}

function deleteTier(tierId){
  const org = currentOrg();
  if(org.settings.tiers.length<=1){ toast('You must have at least one tier', 'error'); return; }
  if(!confirm('Delete this tier? Members on this tier will need to be reassigned.')) return;
  org.settings.tiers = org.settings.tiers.filter(t=>t.id!==tierId);
  persist();
  renderSettingsContent();
  toast('Tier deleted');
}

/* ============================================================
   APP INIT
   ============================================================ */
function initApp(){
  renderLanding();
  if(SESSION && SESSION.role === 'platformAdmin'){
    enterPlatformAdmin();
  } else if(SESSION && DB.orgs[SESSION.orgId]){
    enterDashboard();
  }
  document.addEventListener('keydown', e=>{
    if(e.key === 'Escape'){
      if(_qrScanState.active) closeQRScanner();
      document.querySelectorAll('.modal-backdrop').forEach(m=>m.remove());
    }
  });
}
initApp();
</script>
